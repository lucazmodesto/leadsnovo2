<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GERADOR DE LEADS | Ferro & Aço</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #0056b3; 
            --secondary: #218838; 
            --bg: #f0f2f5; 
            --success-bg: #d4edda; 
            --success-text: #155724; 
        }
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background-color: var(--bg); 
            color: #1a1a1a; 
            padding-bottom: 80px; 
        }
        header { 
            background: var(--primary); 
            color: white; 
            padding: 18px; 
            text-align: center; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }
        header h1 { 
            font-size: 1.1rem; 
            margin: 0; 
            text-transform: uppercase; 
            font-weight: 800; 
        }
        .container { 
            width: 100%; 
            max-width: 480px; 
            margin: 0 auto; 
            padding: 15px; 
            box-sizing: border-box; 
        }
        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            border: 1px solid #ddd; 
            position: relative; 
        }
        
        #list-screen { display: block; }
        #form-screen { display: none; }

        .lead-item { 
            background: white; 
            padding: 15px; 
            border-radius: 10px; 
            margin-bottom: 10px; 
            border-left: 5px solid var(--primary); 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            display: block;
            color: inherit;
        }
        .lead-item h3 { margin: 0 0 5px 0; font-size: 1rem; color: #333; }
        .lead-item p { margin: 2px 0; font-size: 0.85rem; color: #666; }
        .lead-id { 
            font-family: monospace; 
            font-weight: 800; 
            color: var(--primary); 
            background: #eef2ff; 
            padding: 2px 6px; 
            border-radius: 4px; 
            font-size: 0.8rem; 
        }

        .fab { 
            position: fixed; 
            bottom: 25px; 
            right: 25px; 
            width: 65px; 
            height: 65px; 
            background: var(--secondary); 
            color: white; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 24px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
            border: none; 
            cursor: pointer; 
            z-index: 2000; 
            transition: transform 0.2s;
        }
        .fab:active { transform: scale(0.9); }

        label { 
            display: block; 
            margin-bottom: 4px; 
            font-weight: 700; 
            font-size: 0.75rem; 
            color: #555; 
            text-transform: uppercase; 
        }
        input, select, textarea { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 14px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; 
            background-color: #fff; 
            font-family: inherit;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
        }
        .btn-geo { 
            background: #138496; 
            color: white; 
            border: none; 
            padding: 14px; 
            width: 100%; 
            border-radius: 8px; 
            margin-bottom: 18px; 
            cursor: pointer; 
            font-weight: 700; 
            text-transform: uppercase; 
            font-size: 0.8rem; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
        }
        .btn-main { 
            background: var(--secondary); 
            color: white; 
            border: none; 
            padding: 16px; 
            width: 100%; 
            border-radius: 8px; 
            font-weight: 800; 
            text-transform: uppercase; 
            cursor: pointer; 
            font-size: 1rem; 
        }
        #success-msg { 
            display: none; 
            background: var(--success-bg); 
            color: var(--success-text); 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            text-align: center; 
            font-weight: 600; 
            border: 1px solid #c3e6cb;
            animation: fadeIn 0.5s;
        }
        .log-container { 
            margin-top: 15px; 
            background: #000; 
            color: #00ff00; 
            padding: 12px; 
            border-radius: 8px; 
            font-family: monospace; 
            font-size: 0.7rem; 
            display: none; 
            word-break: break-all; 
        }
        .readonly-field { 
            background-color: #f8f9fa; 
            color: #666; 
            cursor: not-allowed; 
        }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(-10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>

<header id="main-header">
    <h1><i class="fas fa-building"></i> GERADOR DE LEADS</h1>
</header>

<div class="container" id="list-screen">
    <div id="leads-list"></div>
    <button type="button" class="fab" onclick="abrirFormulario()">
        <i class="fas fa-plus"></i>
    </button>
</div>

<div class="container" id="form-screen">
    <div id="success-msg"><i class="fas fa-check-circle"></i> LEAD SALVO COM SUCESSO!</div>

    <div class="card">
        <button type="button" class="btn-geo" onclick="pegarLocalizacao()" id="btnGeo">
            <i class="fas fa-location-arrow"></i> OBTER LOCALIZAÇÃO AUTOMÁTICA
        </button>

        <label>Nome do Lead</label>
        <input type="text" id="Name" value="Novo Lead">

        <label>Telefone</label>
        <input type="tel" id="Phone" placeholder="(11) 99999-9999" oninput="maskPhone(this)">

        <label>E-mail</label>
        <input type="email" id="EMail" placeholder="vendas@exemplo.com">

        <div class="grid">
            <div><label>Cidade</label><input type="text" id="City" value="Itu"></div>
            <div><label>CEP</label><input type="text" id="Postal" placeholder="00000-000"></div>
        </div>

        <label>Rua / Logradouro</label>
        <input type="text" id="Address1">

        <div class="grid">
            <div><label>Número</label><input type="text" id="Address2" value="S/N"></div>
            <div><label>Bairro</label><input type="text" id="Address3"></div>
        </div>

        <div class="grid">
            <div><label>Latitude</label><input type="text" id="Lat" class="readonly-field" readonly></div>
            <div><label>Longitude</label><input type="text" id="Long" class="readonly-field" readonly></div>
        </div>

        <label>Responsável Atribuição</label>
        <select id="RespAtrib">
            <option value="5143326">Maria Victoria</option>
        </select>

        <label>Estágio da Obra</label>
        <select id="Greeting">
            <option value="5000005">Baldrame</option>
            <option value="5000006">Estacas</option>
            <option value="5000001">Fundação</option>
            <option value="5000007">Furação</option>
            <option value="5000008">Gabarito</option>
            <option value="5000012">Muros</option>
            <option value="5000011">Superior</option>
            <option value="5000009">Terraplanagem</option>
        </select>

        <label>Campanha / Origem</label>
        <select id="Campanha">
            <option value="5000021">Prospecção Externa</option>
            <option value="5000030">Prospecção Interna</option>
            <option value="5000041">Mídia Digital</option>
            <option value="5000084">Instagram</option>
        </select>

        <label>Status do Lead</label>
        <select id="LeadStatus">
            <option value="CF">Contato feito</option>
            <option value="II" selected>Identificação de interesse</option>
            <option value="N">Nova</option>
            <option value="R">Retomada</option>
        </select>

        <label>Observações / Comentários</label>
        <textarea id="Comments" placeholder="Digite informações relevantes sobre a obra ou contato..."></textarea>

        <button type="button" onclick="criarLeadNoERP()" id="btnSend" class="btn-main" style="width: 100%;">🚀 SALVAR NO BRERP</button>
        <button type="button" onclick="voltarLista()" style="margin-top:15px; background:none; border:none; color:#666; width:100%; font-size:0.8rem; cursor:pointer;">CANCELAR E VOLTAR</button>
        
        <div id="console" class="log-container"></div>
    </div>
</div>

<script>
    let TOKEN_ERP = 'eyJraWQiOiJpZGVtcGllcmUiLCJhbGciOiJIUzUxMiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJJbnRlZ3Jhw6fDo28gR2VuaXN5cyIsIkFEX0NsaWVudF9JRCI6NTAwMDAxNywiQURfVXNlcl9JRCI6NTIwMjkxNCwiQURfUm9sZV9JRCI6NTAwMDc5NiwiQURfT3JnX0lEIjo1MDAwMDQ5LCJBRF9MYW5ndWFnZSI6InB0X0JSIiwiQURfU2Vzc2lvbl9JRCI6NzQ0Nzc2NywiaXNzIjoiaWRlbXBpZXJlLm9yZyJ9.2bFo2Xx0gI9Gga_vOUDEFn19aPPNTb4bfgTvzavx1lXgMZEHxbxJEt4QLS3BbIBZGQkhrFJ44BD6kKYzUJz-Qg';
    const API_BASE = "https://acero.api.devco.cloud/api/v1/models";

    function gerarProximoID() {
        let atual = parseInt(localStorage.getItem('contadorLeads') || '0');
        let proximo = atual + 1;
        localStorage.setItem('contadorLeads', proximo);
        return "Aut" + proximo.toString().padStart(5, '0');
    }

    function abrirFormulario() {
        document.getElementById('list-screen').style.display = 'none';
        document.getElementById('form-screen').style.display = 'block';
        window.scrollTo(0,0);
    }

    function voltarLista() {
        document.getElementById('form-screen').style.display = 'none';
        document.getElementById('list-screen').style.display = 'block';
        renderizarLeads();
    }

    function renderizarLeads() {
        const container = document.getElementById('leads-list');
        const leads = JSON.parse(localStorage.getItem('meusLeads') || '[]');
        if (leads.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#999; margin-top:50px;">Nenhum lead lançado ainda.</p>';
            return;
        }
        container.innerHTML = '<h2 style="font-size:0.9rem; color:#666; margin-bottom:15px;">HISTÓRICO RECENTE (OFFLINE)</h2>' + 
            leads.map(l => `
                <div class="lead-item">
                    <h3>${l.nome}</h3>
                    <p><i class="fas fa-map-marker-alt"></i> ${l.cidade}</p>
                    <p><i class="fas fa-search"></i> CHAVE DE BUSCA: <span class="lead-id">${l.id}</span></p>
                </div>
            `).join('');
    }

    function formatarTexto(texto) {
        if (!texto) return "";
        return texto.toLowerCase().replace(/(^\w|\s\w)/g, m => m.toUpperCase());
    }

    function maskPhone(i) {
        let v = i.value.replace(/\D/g, '');
        v = v.replace(/^(\d{2})(\d)/g, "($1) $2").replace(/(\d)(\d{4})$/, "$1-$2");
        i.value = v;
    }

    function pegarLocalizacao() {
        const btn = document.getElementById('btnGeo');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> OBTENDO...';
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                document.getElementById('Lat').value = pos.coords.latitude.toFixed(6);
                document.getElementById('Long').value = pos.coords.longitude.toFixed(6);
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                    const data = await res.json();
                    if (data.address) {
                        document.getElementById('City').value = formatarTexto(data.address.city || data.address.town || "Itu");
                        document.getElementById('Address1').value = formatarTexto(data.address.road || "");
                        document.getElementById('Address3').value = formatarTexto(data.address.suburb || "");
                        document.getElementById('Postal').value = data.address.postcode || "";
                        btn.innerHTML = '<i class="fas fa-check"></i> LOCALIZADO';
                    }
                } catch (e) { btn.innerHTML = 'GPS ATIVO'; }
            }, null, { enableHighAccuracy: true });
        }
    }

    async function criarLeadNoERP() {
        const logger = document.getElementById('console');
        const btn = document.getElementById('btnSend');
        const successBox = document.getElementById('success-msg');
        const novoID = gerarProximoID();
        const nomeParaEnvio = formatarTexto(document.getElementById('Name').value);
        
        logger.style.display = 'block';
        logger.innerHTML = '> Enviando...';
        btn.disabled = true;

        try {
            const resLoc = await fetch(`${API_BASE}/c_location`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN_ERP}` },
                body: JSON.stringify({
                    "AD_Org_ID": 5000049,
                    "Address1": formatarTexto(document.getElementById('Address1').value),
                    "Address2": document.getElementById('Address2').value,
                    "Address3": formatarTexto(document.getElementById('Address3').value),
                    "City": formatarTexto(document.getElementById('City').value),
                    "C_Region_ID": 465, 
                    "C_Country_ID": 139,
                    "Postal": document.getElementById('Postal').value,
                    "COF_Latitude": document.getElementById('Lat').value,
                    "COF_Longitude": document.getElementById('Long').value
                })
            });
            const dataLoc = await resLoc.json();

            const dataAtribuicao = new Date().toISOString().split('.')[0] + "Z";
            const idResponsavel = Number(document.getElementById('RespAtrib').value);

            const resUser = await fetch(`${API_BASE}/ad_user`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN_ERP}` },
                body: JSON.stringify({
                    "AD_Org_ID": 5000049,
                    "Name": nomeParaEnvio,
                    "BPName": nomeParaEnvio,
                    "Phone": document.getElementById('Phone').value.replace(/\D/g, ''),
                    "EMail": document.getElementById('EMail').value,
                    "Comments": document.getElementById('Comments').value,
                    "C_Location_ID": dataLoc.id,
                    "C_Campaign_ID": Number(document.getElementById('Campanha').value),
                    "C_Greeting_ID": Number(document.getElementById('Greeting').value),
                    "LeadStatus": document.getElementById('LeadStatus').value,
                    "SalesRep_ID": idResponsavel,
                    "COF_RespAtribuicao_ID": idResponsavel,
                    "COF_DataAtribuicao": dataAtribuicao,
                    "IsSalesLead": true,
                    "Value": novoID
                })
            });

            if (resUser.ok) {
                let leads = JSON.parse(localStorage.getItem('meusLeads') || '[]');
                leads.unshift({ 
                    id: novoID, 
                    nome: nomeParaEnvio, 
                    cidade: document.getElementById('City').value
                });
                localStorage.setItem('meusLeads', JSON.stringify(leads.slice(0, 10)));

                successBox.style.display = 'block';
                logger.innerHTML = '> ✅ Lead registrado com sucesso no BrERP.';
                
                setTimeout(() => {
                    successBox.style.display = 'none';
                    logger.style.display = 'none';
                    btn.disabled = false;
                    document.getElementById('Name').value = "Novo Lead";
                    document.getElementById('Phone').value = "";
                    document.getElementById('EMail').value = "";
                    document.getElementById('Address1').value = "";
                    document.getElementById('Address3').value = "";
                    document.getElementById('Comments').value = "";
                    voltarLista();
                }, 2500);
            } else { 
                const erroMsg = await resUser.text();
                logger.innerHTML = `> ❌ ERRO API: ${erroMsg}`;
                btn.disabled = false;
            }
        } catch (e) { 
            logger.innerHTML = "> ❌ ERRO CONEXÃO: " + e.message;
            btn.disabled = false;
        }
    }

    window.onload = function() {
        renderizarLeads();
    }
</script>
</body>
</html>
